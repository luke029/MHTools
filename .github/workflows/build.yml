name: Build APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: python3 scripts/build_apk.py

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
