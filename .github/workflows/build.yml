name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build tarball
        run: |
          chmod +x scripts/build_release.py
          python3 scripts/build_release.py -o mhtools-release.tar.gz
          ls -lh mhtools-release.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: mhtools-release.tar.gz
